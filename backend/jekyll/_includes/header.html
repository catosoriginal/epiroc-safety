<header id="mainheader">
    <div class="upvisuals">
        <img class="logo" alt="Epiroc Logo" src="{{ 'backend/assets/icons/epiroc-logo-yellow-icon-nobg.png' | relative_url }}">
        <p class="cname">Epiroc</p>
        <p class="ccytate">Fast, effective, safe.</p>
    </div>  
    <div class="redirects">
        <a href="{{ '/about-epiroc' | relative_url }}">About Epiroc</a>
        <a href="{{ '/employee-safety-technologies' | relative_url }}">Employee Safety Technologies</a>
        <a href="{{ '/comparison-with-competitors-safety' | relative_url }}">Comparison with competitors safety</a>
        <a href="{{ '/partners' | relative_url }}">Partners</a>
        <a class="notice" href="{{ '/site-project' | relative_url }}">Site Project</a>
    </div>
    <div class="downvisuals">
        <p class="pl">> {{ page.displaypermalink }}</p>
    </div>
</header>
<style>
    #mainheader {
        max-width: 100%;
        width: 100%;
        background-color: var(--pagecolor1);
        display: flex;
        flex-direction: column;
        margin-bottom: 5px;
    }
    #mainheader .upvisuals {
        max-width: 100%;
        width: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;
    }
    #mainheader .upvisuals .cname {
        font-size: clamp(37px, 45px, 68px);
        color: var(--pagecolor2);
        font-weight: 700;
        line-height: 1.2;
        margin: 0;
        margin-right: 3px;
    }
    #mainheader .upvisuals .ccytate {
        font-size: clamp(25px, 35px, 5px);
        color: var(--pagecolor3);
        font-weight: 700;
        line-height: 1.2;
        margin: 0;
    }
    #mainheader .upvisuals .logo {
        width: 55px;
        height: 55px;
        object-fit: contain;
        margin: 0;
    }
    #mainheader .redirects {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap ;
        align-items: center;
        background-color: var(--pagecolor2);
        padding: 5px 5px;
        margin-bottom: 3px;
    }
    #mainheader .redirects a {
        all: unset;
        background-color: var(--pagecolor1);
        color: var(--pagecolor2);
        border-radius: 5px;
        padding: 3px 3px;
        margin-right: 7px;
        margin-top: 3px;
    }
    #mainheader .redirects a.notice {
        margin-left: auto;
        background-color: var(--pagecolor2);
        color: var(--pagecolor1);
        border: 5px dotted var(--pagecolor1);
    }
    #mainheader .redirects a:hover {
        background-color: var(--pagecolor3);
        color: var(--pagecolor1);
        cursor: pointer;
    }
    #mainheader .downvisuals {
        max-width: 100%;
        width: 100%;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap ;
        align-items: center;
        background-color: var(--pagecolor2);
        padding: 1px 1px;
        margin-bottom: 3px;
        overflow-x: auto;
        
    }
    #mainheader .downvisuals .pl {
        max-width: 100%;
        width: 100%;
        text-align: center;
        font-size: clamp(10px, 15px, 35px);
        color: var(--pagecolor1);
        font-weight: 700;
        line-height: 1.2;
    }

</style>
