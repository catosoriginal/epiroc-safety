<!DOCTYPE html>
<html>
    <head>
        <!-- making site viewport, so website can look perfect on any device -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- changing site charset -->
        <meta charset="UTF-8">
        <!-- changing site title -->
        <title>{{ page.title }}</title>
        <!-- chaning site icon -->
        <link rel="icon" href="{{ page.icon | relative_url }}" type="image/x-icon">

        <!-- No javascript enabled in browser warning. (but site cant operate normal without javascript) -->
        <noscript>You need to enable javascript to use this website!</noscript>

        <!-- Fonts imports -->
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet"> <!-- Manrope font -->
        <link href="https://api.fontshare.com/v2/css?f[]=supreme@400,500,600,700&display=swap" rel="stylesheet"> <!-- Supreme font-->
        
    </head>
    <body>
        <!-- some styles -->
        <style> 
            #page-wrapper {
                max-width: 100vw;
            }
            #content {
                max-width: 100%;
                width: 100%;
                overflow-x: hidden;
                display: block;
                body {
                background-color: rgb(39, 39, 39);
                color: aliceblue;
                font-family: 'Supreme', sans-serif;
            }
            #content #content-md {
                max-width: 100%;
                width: 100%;
                overflow-x: scroll;
            }
            
        }
        </style>
        <!-- main page wrapper (to disable page zoom  etc.) -->
        <div id="page-wrapper">
            <!-- inserting header to page -->
            {% include header.html %}
            <div id="content">
            
            {% if content %}
              <div id="content-html">
                <!-- inserting page content to page -->
                {{ content }}
              </div>
            {% endif %}
            {% if page.loadmd %}
                <div id="content-md">
                    {% capture md %}
                    <!-- capturing markdown and soon as possible inserting -->
                        {% include {{ page.loadmd }} %}
                    {% endcapture %}
                
                    {{ md | markdownify }}
                </div>
            {% endif %}
            <!-- inserting footer to page -->
            {% include footer.html %}
        </div>
    </body>
</html>
