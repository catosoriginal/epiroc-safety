<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <title>{{ page.title }}</title>
        <link rel="icon" href="{{ page.icon | relative_url }}" type="image/x-icon">
        <noscript>You need to enable javascript to use this website!</noscript>

        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://api.fontshare.com/v2/css?f[]=supreme@400,500,600,700&display=swap" rel="stylesheet">
        
    </head>
    <body>
        <style>
            #content {
            max-width: 100%;
            width: 100%;
            overflow-x: hidden;
            display: block;
            
        }
        body {
            background-color: rgb(39, 39, 39);
            color: aliceblue;
        }
        </style>
        {% include header.html %}
        <style>
            #content {
                font-family: 'Supreme', sans-serif;
            }
        </style>
        <div id="content">
            
            {% if content %}
              <div id="content-html">
                {{ content }}
              </div>
            {% endif %}
            {% if page.loadmd %}
                <style>
                    #content #content-md {
                        max-width: 100%;
                        width: 100%;
                        overflow-x: scroll;
                    }
                </style>
                <div id="content-md">
                    {% capture md %}
                        {% include {{ page.loadmd }} %}
                    {% endcapture %}
                
                    {{ md | markdownify }}
                </div>
            {% endif %}
        </div>
        {% include footer.html %}
    </body>
</html>
