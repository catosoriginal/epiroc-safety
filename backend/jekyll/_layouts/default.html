<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <title>{{ page.title }}</title>
        <link rel="icon" href="{{ page.icon | relative_url }}" type="image/x-icon">
        <noscript>You need to enable javascript to use this website!</noscript>
    </head>
    <body>
        <style>
            #content {
            max-width: 100%;
            width: 100%;
            overflow-x: block;
            display: block;
            
        }
        body {
            background-color: rgb(39, 39, 39);
            color: aliceblue;
        }
        </style>
        {% include header.html %}
        <div id="content">
            
            {% if content %}
              <div id="content-html">
                {{ content }}
              </div>
            {% endif %}
            {% if page.loadmd %}
                <div id="content-md">
                    {% capture md %}
                        {% include {{ page.loadmd }} %}
                    {% endcapture %}
                
                    {{ md | markdownify }}
                </div>
            {% endif %}
        </div>
    </body>
</html>
