<!DOCTYPE html>
<html>
    <head>
        <!-- making site viewport, so website can look perfect on any device -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- changing site charset -->
        <meta charset="UTF-8">
        <!-- changing site title -->
        <title>{{ page.title }}</title>
        <!-- chaning site icon -->
        <link rel="icon" href="{{ page.icon | relative_url }}" type="image/x-icon">

        <!-- No javascript enabled in browser warning. (but site cant operate normal without javascript) -->
        <!-- i created javascript only for owner verify page. -->
        <noscript>You need to enable javascript to use this website!</noscript>

        <!-- Fonts imports -->
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet"> <!-- Manrope font -->
        <link href="https://api.fontshare.com/v2/css?f[]=supreme@400,500,600,700&display=swap" rel="stylesheet"> <!-- Supreme font-->

        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-KW9Z9DV4P3"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
             gtag('js', new Date());
             gtag('config', 'G-KW9Z9DV4P3');
        </script>
        <script>
            document.addEventListener("DOMContentLoaded", async () => {
                console.group("EpirocSafety")
                console.log("Welcome to my website!")
                console.log("View website source (repository): https://github.com/catosoriginal/epiroc-safety")
                console.log("View website presentation: https://catosoriginal.github.io/epiroc-safety/site-project/presentation")
                console.log("Verify website owner (secret code needed): https://catosoriginal.github.io/epiroc-safety/site-project/verify-owner")
                console.groupEnd()
            })
        </script>
        
    </head>
    <body>
        
        <!-- some styles -->
        <style> 
            :root {
                --pagecolor1: {{ site.pagecolor1 }};
                --pagecolor2: {{ site.pagecolor2 }};
                --pagecolor3: {{ site.pagecolor3 }};
            }
            body {
                background-color: rgb(238, 238, 238);
                color: rgb(72, 101, 115);
                font-family: 'Supreme', sans-serif;
            }
            #page-wrapper {
                max-width: 100%;
                width: 100%;
                margin: 0 0;
            }
            #page-wrapper .content {
                max-width: 100%;
                width: 100%;
                overflow-x: hidden;
                display: block;
            }
            #page-wrapper .content .md {
                max-width: 100%;
                width: 100%;
                overflow-x: scroll;
            }
        
        </style>
        <!-- main page wrapper (to disable page zoom  etc.) -->
        <div id="page-wrapper">
            <!-- inserting header to page -->
            {% include header.html %}
            <div class="content">
            
                {% if content %}
                <div class="html">
                    <!-- inserting page content to page -->
                    {{ content }}
                </div>
                {% endif %}
                {% if page.loadmd %}
                <div class="md">
                    <!-- capturing markdown and soon as possible inserting -->
                     <!-- MarkDown insert is not using in website, but used to :( -->
                    {% capture md %}
                        {% include {{ page.loadmd }} %}
                    {% endcapture %}
                
                    {{ md | markdownify }}
                </div>
                {% endif %}
                <!-- inserting footer to page -->
                {% include footer.html %}
            </div>
        </div>
    </body>
</html>
