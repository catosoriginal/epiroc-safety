<div class=presentationframe>
    <div class="upnavigation">
        <p class=text>Presentation viewer</p>
        <button class=viewoncanva onclick="document.location.href = 'https://canva.link/5hqdaffotsgfe6x'">View on Canva</button>
    </div>
    <div class="viewer">
        <iframe loading="lazy" src="https://www.canva.com/design/DAHH8g6T99o/JwcYuNQ7VwmLncUsgf4xIw/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
        </iframe>
    </div>
</div>

<style>
    .presentationframe {
        max-width: 100%;
        width: 100%;
        background-color: var(--pagecolor1);
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    .presentationframe .viewer {
        flex: 1;
        max-width: 100%;
        width: 100%;
    }
    .presentationframe .viewer iframe {
        max-width: 100%;
        width: 100%;
        height: 100%;
        border: none;
    }
    .presentationframe .upnavigation {
        max-width: 100%;
        width: 100%;
        background-color: var(--pagecolor2);
        justify-content: center;
        align-items: center;
        display: flex;
        gap: 10px
    }
    .presentationframe .upnavigation .text {
        text-align: center;
        font-size: clamp(15px, 25px, 35px);
        color: var(--pagecolor1 );
        font-weight: 700;
        line-height: 1.2;
    }
    .presentationframe .upnavigation .viewoncanva {
        border: 0;
        border-radius: 5px;
        background-color: var(--pagecolor1);
        color: var(--pagecolor2);
        padding: 10px 15px

    }
    .presentationframe .upnavigation .viewoncanva:hover {
        cursor: pointer;
    }
</style>
